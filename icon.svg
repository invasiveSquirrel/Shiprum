<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0e11;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020202;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer Square -->
  <rect x="16" y="16" width="480" height="480" rx="64" fill="url(#bg-grad)" stroke="#cec6b5" stroke-width="12"/>
  <!-- Inner Square (Significantly closer to outer square) -->
  <rect x="48" y="48" width="416" height="416" rx="42" fill="none" stroke="#cec6b5" stroke-width="6" opacity="0.3"/>
  <!-- Cuneiform KIN (𒆥) - Scaled to maximize inner square space -->
  <text x="50%" y="53%" dominant-baseline="central" text-anchor="middle" font-family="serif" font-size="340" fill="#cec6b5">𒆥</text>
</svg>
